<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100dvh; overflow: hidden;
  background: #0a0a0a; color: #e0e0e0;
  font-family: 'JetBrains Mono', monospace;
  -webkit-tap-highlight-color: transparent;
  overscroll-behavior: none;
}
body { padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }

#app {
  width: 100%; height: 100%; position: relative;
  --level-color: #00ff88;
  --level-glow: rgba(0,255,136,0.06);
}
#app.l1 { --level-color: #00ff88; --level-glow: rgba(0,255,136,0.06); }
#app.l2 { --level-color: #ffcc00; --level-glow: rgba(255,204,0,0.06); }
#app.l3 { --level-color: #ff8800; --level-glow: rgba(255,136,0,0.07); }
#app.l4 { --level-color: #ff2244; --level-glow: rgba(255,34,68,0.07); }
#app.l5 { --level-color: #cc44ff; --level-glow: rgba(204,68,255,0.08); }

.screen {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 200ms ease;
}
.screen.active { opacity: 1; pointer-events: auto; }

/* ===== WELCOME ===== */
#welcome { padding: 2rem; text-align: center; gap: 1.5rem; }
#welcome h1 { font-size: 2.4rem; font-weight: 700; color: #fff; letter-spacing: -0.03em; line-height: 1.1; }
#welcome .subtitle { font-size: 1rem; color: #00ff88; font-weight: 700; }
#welcome .rules {
  font-size: 1rem; color: #ccc; line-height: 2; max-width: 340px;
}
#welcome .rules strong { color: #fff; }
#welcome .rules .lose { color: #ff2244; font-weight: 700; }
#welcome .rules .win { color: #00ff88; font-weight: 700; }
#welcome .desc-small { font-size: 0.75rem; color: #555; line-height: 1.6; max-width: 300px; }

.btn-start {
  background: #00ff88; color: #0a0a0a; border: none;
  padding: 1.1rem 3.5rem; font-family: 'JetBrains Mono', monospace;
  font-size: 1.15rem; font-weight: 700; border-radius: 10px; cursor: pointer;
  animation: pulse-glow 2s ease-in-out infinite; transition: transform 100ms ease;
}
.btn-start:active { transform: scale(0.96); }

@keyframes pulse-glow {
  0%, 100% { box-shadow: 0 0 20px rgba(0, 255, 136, 0.3); }
  50% { box-shadow: 0 0 40px rgba(0, 255, 136, 0.6); }
}

.welcome-footer {
  font-size: 0.9rem; color: #666;
}
.welcome-footer a { color: #888; text-decoration: none; border-bottom: 1px solid #555; }
.welcome-footer a:hover { color: #ccc; }

/* ===== GAME ===== */
#game {
  user-select: none; touch-action: manipulation; cursor: pointer;
  background: radial-gradient(ellipse 80% 60% at center, transparent 35%, var(--level-glow) 100%);
  transition: background 600ms ease;
}

.water-bg {
  position: absolute; bottom: 0; left: 0; right: 0; height: 100%;
  background: rgba(0, 255, 136, 0.15);
  transition: height 300ms ease-out, background-color 500ms ease;
  pointer-events: none; z-index: 0;
}
.game-divider {
  position: absolute; top: 0; bottom: 0; left: 50%; width: 1px;
  background: var(--level-color); opacity: 0.22;
  z-index: 1; pointer-events: none;
  transition: background 600ms ease;
}
.zone-label {
  position: absolute; top: 50%; transform: translateY(-50%);
  font-size: 3rem; color: var(--level-color); opacity: 0.22;
  z-index: 1; pointer-events: none;
  font-weight: 700; line-height: 1;
  transition: color 600ms ease;
}
.zone-label.left { left: calc(25% - 0.5em); }
.zone-label.right { right: calc(25% - 0.5em); }

/* First-tap onboarding hint: pulses left zone then right zone, hides after first tap */
.hint-zone {
  position: absolute; top: 0; bottom: 0; width: 50%;
  pointer-events: none; z-index: 0; opacity: 0;
  background: radial-gradient(ellipse at center, rgba(255,255,255,0.10) 0%, transparent 65%);
}
.hint-zone.hint-left  { left: 0;  animation: hint-pulse 1.4s ease-in-out 0.35s 1 both; }
.hint-zone.hint-right { right: 0; animation: hint-pulse 1.4s ease-in-out 1.15s 1 both; }
#game.tapped .hint-zone { animation: none !important; opacity: 0 !important; }
@keyframes hint-pulse {
  0%   { opacity: 0; }
  45%  { opacity: 1; }
  100% { opacity: 0; }
}

.game-hud {
  position: absolute; top: 0; left: 0; right: 0; z-index: 2; pointer-events: none;
  display: flex; flex-direction: column; align-items: center; padding-top: 3rem; gap: 0.25rem;
}
.hud-level { font-size: 0.7rem; color: #555; letter-spacing: 0.05em; }
.hud-balance { font-size: 2.5rem; font-weight: 700; color: #e0e0e0; }
.hud-prediction-result {
  font-size: 1.5rem; opacity: 0; transition: opacity 150ms ease;
  height: 2rem; display: flex; align-items: center; justify-content: center;
}
.hud-prediction-result.correct { color: #ff2244; }
.hud-prediction-result.wrong { color: #00ff88; }
.hud-prediction-result.show { opacity: 1; }

.hud-bottom {
  position: absolute; bottom: 1.5rem; left: 0; right: 0;
  text-align: center; z-index: 2; pointer-events: none;
  font-size: 1rem; font-weight: 700; color: #555;
}

.btn-stop {
  position: absolute; top: 1rem; right: 1rem; z-index: 3;
  background: transparent; border: 1px solid rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.3); font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem; padding: 0.4rem 0.8rem; border-radius: 4px;
  cursor: pointer; transition: opacity 200ms;
}
.btn-stop:disabled { opacity: 0; pointer-events: none; }
.btn-stop:hover:not(:disabled) { color: rgba(255,255,255,0.6); border-color: rgba(255,255,255,0.3); }

.ripple {
  position: absolute; border-radius: 50%; background: rgba(255,255,255,0.15);
  transform: scale(0); animation: ripple-anim 400ms ease-out forwards;
  pointer-events: none; z-index: 1;
}
@keyframes ripple-anim { to { transform: scale(1); opacity: 0; } }

/* ===== RESULT ===== */
#result {
  padding: 1.5rem 1.5rem 3rem; text-align: center; overflow-y: auto;
  justify-content: flex-start;
  justify-content: flex-start; padding-top: 3rem; gap: 1rem;
}
#result h2 { font-size: 1.4rem; font-weight: 700; line-height: 1.3; }
.result-balance { font-size: 2.2rem; font-weight: 700; }

.result-stats { width: 100%; max-width: 340px; text-align: left; font-size: 0.8rem; color: #999; line-height: 1.8; }
.result-stats span { color: #e0e0e0; }

.balance-graph-container { width: 100%; max-width: 340px; }
.balance-graph-label { font-size: 0.7rem; color: #555; text-align: left; margin-bottom: 0.3rem; }
.balance-graph {
  width: 100%; height: 80px; border-radius: 6px; overflow: hidden;
  background: #111; border: 1px solid #222;
}

.pattern-map-container { width: 100%; max-width: 340px; display: flex; flex-direction: column; gap: 0.3rem; }
.pattern-map-label { font-size: 0.7rem; color: #555; text-align: left; }
.pattern-map { display: flex; flex-wrap: wrap; gap: 1px; }
.pattern-map .cell { width: 6px; height: 6px; border-radius: 1px; }

.result-buttons { display: flex; flex-direction: column; gap: 0.75rem; width: 100%; max-width: 280px; margin-top: 0.5rem; }

.btn-primary {
  background: var(--level-color); color: #0a0a0a; border: none; padding: 0.9rem 2rem;
  font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; font-weight: 700;
  border-radius: 8px; cursor: pointer;
  transition: transform 100ms, background 400ms ease;
}
.btn-primary:active { transform: scale(0.96); }
.btn-secondary {
  background: transparent; color: #999; border: 1px solid #333; padding: 0.8rem 2rem;
  font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; border-radius: 8px;
  cursor: pointer; transition: transform 100ms;
}
.btn-secondary:active { transform: scale(0.96); }

/* ===== THEORY (single scroll) ===== */
#theory {
  padding: 1.5rem; padding-bottom: 3rem; overflow-y: auto;
  justify-content: flex-start; align-items: stretch; gap: 0;
}
.theory-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
.theory-header h2 { font-size: 1.3rem; font-weight: 700; }
.btn-back {
  background: transparent; border: 1px solid #333; color: #999;
  font-family: 'JetBrains Mono', monospace; font-size: 0.75rem;
  padding: 0.4rem 0.8rem; border-radius: 4px; cursor: pointer;
}

.theory-body { font-size: 0.88rem; line-height: 1.7; color: #ccc; }
.theory-body p { margin-bottom: 1rem; }
.theory-body strong { color: #e0e0e0; }
.theory-body a { color: #00ff88; text-decoration: none; border-bottom: 1px solid rgba(0,255,136,0.3); transition: border-color 150ms; }
.theory-body a:hover { border-color: #00ff88; }
.theory-body ul { padding-left: 1.2rem; margin-bottom: 1rem; }
.theory-body li { margin-bottom: 0.4rem; }

.theory-body .formula {
  background: #111; border: 1px solid #222; border-radius: 6px;
  padding: 0.8rem 1rem; margin: 0.8rem 0; font-size: 0.8rem; color: #aaa; overflow-x: auto;
}
.theory-body .example-box {
  background: #111; border-left: 3px solid #00ff88; padding: 0.8rem 1rem;
  margin: 0.8rem 0; font-size: 0.82rem; color: #bbb; line-height: 1.6;
}
.theory-body .example-box strong { color: #00ff88; }

.theory-divider {
  border: none; border-top: 1px solid #222; margin: 1.5rem 0;
}
.theory-section-title {
  font-size: 1rem; font-weight: 700; color: #e0e0e0; margin-bottom: 1rem;
}
.theory-play-btn { align-self: center; margin: 1.5rem 0; }

.author-link {
  margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #1a1a1a;
  text-align: center; font-size: 0.9rem; color: #666;
}
.author-link a { color: #888; text-decoration: none; border-bottom: 1px solid #555; }
.author-link a:hover { color: #ccc; }

/* ===== LEVEL BADGE ===== */
.level-badge {
  display: inline-block; padding: 0.2rem 0.6rem; border-radius: 4px;
  font-size: 0.7rem; font-weight: 700; letter-spacing: 0.05em;
}
.level-badge.l1 { border: 1px solid #00ff88; color: #00ff88; }
.level-badge.l2 { border: 1px solid #ffcc00; color: #ffcc00; }
.level-badge.l3 { border: 1px solid #ff8800; color: #ff8800; }
.level-badge.l4 { border: 1px solid #ff2244; color: #ff2244; }
.level-badge.l5 { border: 1px solid #cc44ff; color: #cc44ff; }

.result-level-up {
  background: rgba(0,255,136,0.08); border: 1px solid rgba(0,255,136,0.3);
  border-radius: 8px; padding: 1rem; text-align: center; width: 100%; max-width: 340px;
}
.result-level-up .level-up-title { font-size: 1rem; font-weight: 700; color: #00ff88; margin-bottom: 0.3rem; }
.result-level-up .level-up-desc { font-size: 0.75rem; color: #999; }

.btn-next-level {
  background: #ffcc00; color: #0a0a0a; border: none; padding: 0.9rem 2rem;
  font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; font-weight: 700;
  border-radius: 8px; cursor: pointer; transition: transform 100ms;
}
.btn-next-level:active { transform: scale(0.96); }
.btn-next-level.l2 { background: #ffcc00; color: #0a0a0a; }
.btn-next-level.l3 { background: #ff8800; color: #0a0a0a; }
.btn-next-level.l4 { background: #ff2244; color: #fff; }
.btn-next-level.l5 { background: #cc44ff; color: #fff; }
.btn-next-level.final { background: #cc44ff; color: #fff; }

.fade-item { opacity: 0; transform: translateY(10px); animation: fade-up 300ms ease forwards; }
@keyframes fade-up { to { opacity: 1; transform: translateY(0); } }

.btn-lang {
  position: absolute; top: 1rem; right: 1rem; z-index: 10;
  background: transparent; border: 1px solid #555; color: #888;
  font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; font-weight: 700;
  padding: 0.35rem 0.7rem; border-radius: 4px; cursor: pointer;
  letter-spacing: 0.05em;
  animation: lang-pulse 2s ease-in-out infinite;
}
.btn-lang:hover { color: #fff; border-color: #888; }
@keyframes lang-pulse {
  0%, 100% { border-color: #555; color: #888; }
  50% { border-color: #00ff88; color: #00ff88; }
}

/* ===== RESULT CARD (shareable) ===== */
.result-card {
  background: #111; border: 1px solid #222; border-radius: 16px;
  padding: 2rem 1.5rem; width: 100%; max-width: 380px;
  display: flex; flex-direction: column; align-items: center; gap: 0.8rem;
}
.result-card-title {
  font-size: 0.85rem; font-weight: 700; color: #555;
  letter-spacing: 0.08em; text-transform: uppercase;
}
.result-level-badge-big {
  display: inline-block; padding: 0.5rem 1.2rem; border-radius: 8px;
  font-size: 1.1rem; font-weight: 700; letter-spacing: 0.08em;
}
.result-level-badge-big.l1 { border: 2px solid #00ff88; color: #00ff88; }
.result-level-badge-big.l2 { border: 2px solid #ffcc00; color: #ffcc00; }
.result-level-badge-big.l3 { border: 2px solid #ff8800; color: #ff8800; }
.result-level-badge-big.l4 { border: 2px solid #ff2244; color: #ff2244; }
.result-level-badge-big.l5 { border: 2px solid #cc44ff; color: #cc44ff; }
.result-balance-big { font-size: 2.8rem; font-weight: 700; line-height: 1; }

.result-comparison {
  margin-top: 0.4rem; padding: 0.9rem 1rem;
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px; width: 100%;
  text-align: center; line-height: 1.4;
}
.result-comparison .cmp-line {
  font-size: 1rem; color: #ddd;
}
.result-comparison .cmp-line b {
  color: var(--level-color); font-size: 1.6rem; font-weight: 700;
  display: inline-block; margin: 0 0.15em;
}
.result-comparison .cmp-sub {
  font-size: 0.7rem; color: #666; margin-top: 0.25rem; letter-spacing: 0.04em;
}
.result-comparison .cmp-money {
  font-size: 0.95rem; color: #bbb; margin-top: 0.6rem;
  padding-top: 0.6rem; border-top: 1px solid rgba(255,255,255,0.06);
}
.result-comparison .cmp-money b {
  color: #00ff88; font-weight: 700;
}
.result-comparison .cmp-best {
  font-size: 0.85rem; color: #888; margin-top: 0.45rem;
}
.result-comparison .cmp-best b {
  color: #ccc; font-weight: 700;
}
.result-comparison .cmp-best.is-new {
  color: #ffcc00; font-size: 0.95rem;
}
.result-comparison .cmp-best.is-new b {
  color: #ffcc00;
}

/* ===== AGE COLLECTION CARD (shown once after L2) ===== */
.age-card {
  background: linear-gradient(180deg, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.2) 100%);
  border: 2px solid var(--level-color); border-radius: 16px;
  padding: 1.4rem 1.2rem 1.2rem;
  width: 100%; max-width: 380px;
  display: flex; flex-direction: column; align-items: center; gap: 0.55rem;
  margin-bottom: 0.5rem;
  box-shadow: 0 0 32px color-mix(in srgb, var(--level-color) 18%, transparent);
  /* Combine both: fade-up (override .fade-item's animation) + box-shadow pulse */
  animation: fade-up 300ms ease forwards, age-attention 1.6s ease-out 500ms 2;
}
@keyframes age-attention {
  0%, 100% { box-shadow: 0 0 32px color-mix(in srgb, var(--level-color) 18%, transparent); }
  50%      { box-shadow: 0 0 56px color-mix(in srgb, var(--level-color) 45%, transparent); }
}
.age-card .age-title {
  font-size: 0.7rem; font-weight: 700; color: var(--level-color);
  letter-spacing: 0.12em; text-transform: uppercase;
}
.age-card .age-question {
  font-size: 1.15rem; font-weight: 700; color: #fff;
}
.age-card .age-reason {
  font-size: 0.75rem; color: #888; margin-top: -0.2rem;
}
.age-card .age-stepper {
  display: flex; align-items: center; gap: 0.5rem;
  margin: 0.4rem 0 0.2rem;
}
.age-card .age-step-btn {
  width: 3rem; height: 3rem;
  background: rgba(255,255,255,0.04); border: 1px solid #444;
  color: var(--level-color); font-size: 1.6rem; font-weight: 700;
  border-radius: 50%; cursor: pointer; font-family: inherit;
  display: flex; align-items: center; justify-content: center;
  transition: transform 100ms, background 150ms, border-color 150ms;
}
.age-card .age-step-btn:hover { border-color: var(--level-color); background: rgba(255,255,255,0.08); }
.age-card .age-step-btn:active { transform: scale(0.92); }
.age-card .age-value {
  font-size: 3.2rem; font-weight: 700; color: #fff;
  min-width: 4.5rem; text-align: center; line-height: 1;
  font-variant-numeric: tabular-nums;
}
.age-card .age-slider {
  -webkit-appearance: none; appearance: none;
  width: 100%; height: 4px; background: #2a2a2a; border-radius: 2px;
  outline: none; cursor: pointer; margin: 0.4rem 0 0.6rem;
}
.age-card .age-slider::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--level-color); cursor: pointer;
  border: 2px solid #0a0a0a;
  box-shadow: 0 0 12px color-mix(in srgb, var(--level-color) 60%, transparent);
}
.age-card .age-slider::-moz-range-thumb {
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--level-color); cursor: pointer;
  border: 2px solid #0a0a0a;
}
.age-card .age-actions {
  display: flex; gap: 0.6rem; width: 100%; max-width: 280px; margin-top: 0.3rem;
}
.age-card .age-submit {
  flex: 1; padding: 0.85rem; border: none; border-radius: 10px;
  background: var(--level-color); color: #0a0a0a;
  font-family: inherit; font-size: 0.95rem; font-weight: 700;
  cursor: pointer; transition: transform 100ms;
}
.age-card .age-submit:active { transform: scale(0.97); }
.age-card .age-skip {
  background: none; border: 1px solid #333; color: #888;
  padding: 0.85rem 1.1rem; border-radius: 10px;
  font-family: inherit; font-size: 0.85rem; cursor: pointer;
  transition: color 150ms, border-color 150ms;
}
.age-card .age-skip:hover { color: #ccc; border-color: #555; }
.age-card .age-anon {
  font-size: 0.7rem; color: #555; letter-spacing: 0.03em; margin-top: 0.2rem;
}
.age-card.fade-out { opacity: 0; transform: scale(0.96); transition: opacity 250ms, transform 250ms; pointer-events: none; }

/* ===== ENDGAME (Level 5 complete) ===== */
.endgame-card {
  background: linear-gradient(135deg, rgba(204,68,255,0.12) 0%, rgba(0,255,136,0.08) 100%);
  border: 2px solid #cc44ff; border-radius: 16px;
  padding: 2.5rem 2rem; width: 100%; max-width: 380px;
  display: flex; flex-direction: column; align-items: center; gap: 1rem; text-align: center;
}
.endgame-title {
  font-size: 0.85rem; font-weight: 700; color: #888;
  letter-spacing: 0.08em; text-transform: uppercase;
}
.endgame-badge {
  font-size: 1.8rem; font-weight: 700; color: #cc44ff;
  text-shadow: 0 0 30px rgba(204,68,255,0.5);
}
.endgame-message { font-size: 1.5rem; font-weight: 700; color: #fff; line-height: 1.3; }
.endgame-sub { font-size: 0.85rem; color: #999; line-height: 1.6; }
.endgame-balance { font-size: 2.2rem; font-weight: 700; color: #00ff88; }

.result-author { font-size: 0.85rem; color: #666; margin-top: 0.3rem; }
.result-author a { color: #888; text-decoration: none; border-bottom: 1px solid #555; }
.result-author a:hover { color: #ccc; }
</style>
</head>
<body>
<div id="app">

  { id: 2, presses: 60,  balance: 15, reward: 1.10, maxK: 4, css: 'l2', stopMin: 18 },
  { id: 3, presses: 80,  balance: 15, reward: 1.10, maxK: 5, css: 'l3', stopMin: 25 },
  { id: 4, presses: 100, balance: 15, reward: 1.10, maxK: 6, css: 'l4', stopMin: 30 },
  { id: 5, presses: 120, balance: 15, reward: 1.10, maxK: 7, css: 'l5', stopMin: 40 },
];

// ===== STATE =====
const state = {
  screen: 'welcome',
  level: 0,
  maxUnlocked: 0,
  balance: 15.00,
  initialBalance: 15.00,
  carryoverBalance: null,
  checkpointBalance: null,
  balanceHistory: [],
  presses: [],
  predictions: [],
  correct: [],
  table: {},
  currentMaxK: 3,
  totalPresses: 0,
  correctPredictions: 0,
  gameOver: false,
  gameOverReason: '',
  lastPressTime: 0,
  gameStartTime: 0,
  timestamps: [],
  firstTapDone: false,
  predScores: [],     // algorithm score per prediction (post-warmup, aligned with predictions)
  lastPredScore: 0,   // captured inside predict() each call
  tapsX: [],          // per-tap X position, % of game element width (0-100)
  tapsY: [],          // per-tap Y position, % of game element height (0-100)
  pointerTypes: [],   // per-tap input device: m=mouse, t=touch, p=pen, k=keyboard
  // Algorithm checkpoint: snapshot taken at level-entry; restored on retry so
  // a lost attempt does not feed the model on the next try. Won attempts'
  // learning still carries forward via the next-level snapshot.
  pressesCheckpoint: [],
  tableCheckpoint: {},
  currentMaxKCheckpoint: 0,
};

const MIN_INTERVAL = 20;
const WARMUP = 3;

// ===== SCREENS =====
function showScreen(name) {
  state.screen = name;
  document.querySelectorAll('.screen').forEach(s => s.classList.toggle('active', s.id === name));
}

// ===== INIT / EXPAND TABLE =====
function initTable(maxK) {
  state.table = {};
  state.currentMaxK = maxK;
  for (let k = 1; k <= maxK; k++) {
    for (let i = 0; i < (1 << k); i++) {
      state.table[i.toString(2).padStart(k, '0')] = { 0: 0, 1: 0 };
    }
  }
}

function expandTable(newMaxK) {
  for (let k = state.currentMaxK + 1; k <= newMaxK; k++) {
    for (let i = 0; i < (1 << k); i++) {
      const key = i.toString(2).padStart(k, '0');
      if (!state.table[key]) state.table[key] = { 0: 0, 1: 0 };
    }
  }
  state.currentMaxK = newMaxK;
}

// ===== PREDICTION (ensemble) =====
function predict() {
  state.lastPredScore = 0;
  const n = state.presses.length;
  if (n < 1) return Math.random() < 0.5 ? 0 : 1;
  const maxK = state.currentMaxK;
  let score = 0;

  for (let k = 1; k <= maxK; k++) {
    if (n < k) continue;
    const entry = state.table[state.presses.slice(-k).join('')];
    if (!entry) continue;
    const total = entry[0] + entry[1];
    if (total === 0) continue;
    const p1 = (entry[1] + 1) / (total + 2);
    const p0 = (entry[0] + 1) / (total + 2);
    score += (p1 - p0) * Math.sqrt(total) * (1 + k * 0.5);
  }

  if (n >= 3) {
    const total1 = state.presses.reduce((a, b) => a + b, 0);
    score += ((total1 + 1) / (n + 2) - 0.5);
  }

  if (n >= 5) {
    let sw = 0;
    for (let i = 1; i < n; i++) if (state.presses[i] !== state.presses[i-1]) sw++;
    const alt = (sw / (n - 1) - 0.5) * 3;
    score += state.presses[n-1] === 1 ? -alt : alt;
  }

  if (n >= 6) {
    const w = Math.min(10, n);
    const recent = state.presses.slice(-w);
    let rsw = 0;
    for (let i = 1; i < recent.length; i++) if (recent[i] !== recent[i-1]) rsw++;
    const ralt = (rsw / (recent.length - 1) - 0.5) * 2;
    score += state.presses[n-1] === 1 ? -ralt : ralt;
  }

  state.lastPredScore = Math.round(score * 1000) / 1000;
  if (score > 0) return 1;
  if (score < 0) return 0;
  return Math.random() < 0.5 ? 0 : 1;
}

function updateTable(actual) {
  const n = state.presses.length;
  for (let k = 1; k <= state.currentMaxK; k++) {
    if (n < k + 1) continue;
    const ctx = state.presses.slice(-(k+1), -1).join('');
    if (state.table[ctx]) state.table[ctx][actual]++;
  }
}

// ===== WATER =====
function updateWater() {
  const ratio = Math.max(0, Math.min(2, state.balance / state.initialBalance));
  const el = document.getElementById('waterBg');
  el.style.height = (Math.min(ratio, 1) * 100) + '%';
  const hue = Math.max(0, Math.min(150, ratio * 75));
  el.style.background = 'hsla(' + hue + ', 80%, 50%, 0.15)';
}

// ===== HUD =====
function updateHUD() {
  const lvl = LEVELS[state.level];
  document.getElementById('hudLevel').innerHTML = '<span class="level-badge ' + lvl.css + '">' + T.level + ' ' + lvl.id + '</span>';
  document.getElementById('hudBalance').textContent = '$' + state.balance.toFixed(2);
  document.getElementById('hudCounter').textContent = state.totalPresses + '/' + lvl.presses;

}

function flashResult(wasCorrect) {
  const el = document.getElementById('hudPredResult');
  el.textContent = wasCorrect ? '\u2717' : '\u2713';
  el.className = 'hud-prediction-result show ' + (wasCorrect ? 'correct' : 'wrong');
  setTimeout(() => el.classList.remove('show'), 500);
}

// ===== RIPPLE & VIBRATE =====
function createRipple(x, y) {
  const r = document.createElement('div');
  r.className = 'ripple';
  r.style.cssText = 'width:80px;height:80px;left:' + (x-40) + 'px;top:' + (y-40) + 'px';
  document.getElementById('game').appendChild(r);
  setTimeout(() => r.remove(), 400);
}

// ===== GAME PRESS =====
let activePointerId = null;

const POINTER_CHAR = { mouse: 'm', touch: 't', pen: 'p', keyboard: 'k' };

function handlePress(choice, x, y, pointerId, ptType, gw, gh) {
  if (state.gameOver) return;
  if (activePointerId !== null && activePointerId !== pointerId) return;
  const now = Date.now();
  if (now - state.lastPressTime < MIN_INTERVAL) return;
  state.lastPressTime = now;

  if (!state.firstTapDone) {
    state.firstTapDone = true;
    document.getElementById('game').classList.add('tapped');
  }

  // Track timestamp relative to game start
  state.timestamps.push(now - state.gameStartTime);

  // Track tap position normalized to game element (0–100% with 1 decimal) + pointer type
  state.tapsX.push(gw > 0 ? Math.round((x / gw) * 1000) / 10 : 50);
  state.tapsY.push(gh > 0 ? Math.round((y / gh) * 1000) / 10 : 50);
  state.pointerTypes.push(POINTER_CHAR[ptType] || '?');

  createRipple(x, y);
  if (navigator.vibrate) navigator.vibrate(10);

  const prediction = predict();
  const predScore = state.lastPredScore;
  state.presses.push(choice);
  state.totalPresses++;
  updateTable(choice);

  if (state.totalPresses > WARMUP) {
    const hit = prediction === choice;
    state.predictions.push(prediction);
    state.predScores.push(predScore);
    state.correct.push(hit);
    if (hit) { state.correctPredictions++; state.balance -= 1.00; }
    else { state.balance += LEVELS[state.level].reward; }
    state.balance = Math.round(state.balance * 100) / 100;
    state.balanceHistory.push(state.balance);
    flashResult(hit);
  }

  updateWater();
  updateHUD();

  const limit = LEVELS[state.level].presses;
  if (state.totalPresses >= limit) {
    state.gameOver = true; state.gameOverReason = 'limit';
    setTimeout(showResult, 400);
  }
}

// ===== PERCENTILE COMPARISON =====
// Distributions per level: [P10, P25, P50, P75, P90].
// Accuracy: HIGHER = more predictable = "worse" percentile (player loses).
// Balance:  HIGHER = more money earned = "better" percentile.
// Snapshots from real test sessions on 2026-05-05; live-updated via JSONP.
const ACCURACY_BUCKETS = {
  1: [40.5, 45.9, 54.1, 56.8, 63.8],
  2: [45.6, 50.0, 52.6, 58.7, 63.9],
  3: [49.4, 50.0, 53.2, 63.0, 80.0],
  4: [50.3, 52.0, 53.6, 56.2, 57.7],
  5: [51.8, 52.5, 53.0, 60.7, 67.7],
};
const BALANCE_BUCKETS = {
  1: [8, 11, 14, 17, 20],
  2: [6, 10, 14, 20, 28],
  3: [8, 15, 22, 28, 35],
  4: [5, 15, 25, 33, 42],
  5: [2, 18, 30, 42, 55],
  endgame: [10, 25, 40, 55, 70], // final balance among L5 winners
};
// Sample counts per level — needed for converting percentile → approximate rank.
// Refreshed live from stats endpoint.
const BALANCE_N = { 1: 25, 2: 19, 3: 15, 4: 15, 5: 7, endgame: 1 };
const RANK_TIERS = [3, 5, 10, 20, 50, 100];
const PERCENTILE_AT = [10, 25, 50, 75, 90];

function _percentile(buckets, key, value, maxValForHighOvershoot) {
  const b = buckets[key];
  if (!b || value == null || isNaN(value)) return null;
  if (value <= b[0]) return Math.max(1, Math.round(10 * Math.max(value, 0) / Math.max(b[0], 1)));
  if (value >= b[4]) {
    const span = Math.max((maxValForHighOvershoot || 100) - b[4], 1);
    return Math.min(99, Math.round(90 + 9 * (value - b[4]) / span));
  }
  for (let i = 0; i < 4; i++) {
    if (value >= b[i] && value <= b[i+1]) {
      const span = b[i+1] - b[i] || 1;
      return Math.round(PERCENTILE_AT[i] + (value - b[i]) / span * (PERCENTILE_AT[i+1] - PERCENTILE_AT[i]));
    }
  }
  return 50;
}

function comparePercentile(level, userAcc) {
  return _percentile(ACCURACY_BUCKETS, level, userAcc, 100);
}
function compareBalancePercentile(key, userBal) {
  return _percentile(BALANCE_BUCKETS, key, userBal, BALANCE_BUCKETS[key] ? BALANCE_BUCKETS[key][4] + 30 : 100);
}

function comparisonText(percentile) {
  if (percentile == null) return '';
  const T_ = T_get();
  if (percentile >= 80) return T_.cmpVeryPredictable.replace('{X}', percentile);
  if (percentile >= 50) return T_.cmpPredictable.replace('{X}', percentile);
  if (percentile >= 30) return T_.cmpAverage;
  if (percentile >= 10) return T_.cmpRandom.replace('{X}', 100 - percentile);
  return T_.cmpVeryRandom.replace('{X}', 100 - percentile);
}

function balanceRankText(percentile, n) {
  if (percentile == null || !n || n < 1) return '';
  // Approximate rank from percentile (1 = best, n = worst).
  const rank = Math.max(1, Math.ceil((1 - percentile / 100) * n));
  const T_ = T_get();
  if (rank === 1) return T_.balTopAll;
  for (const tier of RANK_TIERS) {
    if (rank <= tier) return T_.balTopN.replace('{N}', tier);
  }
  return '';
}

// Personal best tracking per level (keys: '1'…'5', 'endgame'). Stored in localStorage.
function getBest(key)        { const v = localStorage.getItem('tns_best_' + key); return v ? parseFloat(v) : null; }
function setBestLS(key, val) { localStorage.setItem('tns_best_' + key, String(val)); }
function updateBest(key, val) {
  const prev = getBest(key);
  if (prev === null || val > prev) { setBestLS(key, val); return true; }
  return false;
}
function bestLineHTML(key, isNewRecord) {
  const best = getBest(key);
  if (best === null) return '';
  const T_ = T_get();
  const tpl = isNewRecord ? T_.balNewRecord : T_.balBest;
  return tpl.replace('{X}', best.toFixed(2));
}

// Live update from Apps Script (JSONP, fails silently; defaults remain)
window.onLiveStats = function(data) {
  if (!data || data.status !== 'ok' || !data.stats) return;
  const acc = data.stats.accuracy || {};
  for (const lvl in acc) {
    const s = acc[lvl];
    if (s && s.p && s.p.length === 5 && s.n >= 5) ACCURACY_BUCKETS[lvl] = s.p;
  }
  const bal = data.stats.balance || {};
  for (const key in bal) {
    const s = bal[key];
    if (s && s.p && s.p.length === 5 && s.n >= 1) {
      BALANCE_BUCKETS[key] = s.p;
      BALANCE_N[key] = s.n;
    }
  }
};
(function loadLiveStats() {
  try {
    const s = document.createElement('script');
    s.src = SHEETS_URL + '?action=stats&callback=onLiveStats&t=' + Date.now();
    s.onerror = () => s.remove();
    s.onload = () => s.remove();

  } catch (e) {}
})();

  return 'desktop';
}

function calcMaxRun(arr) {
  if (arr.length === 0) return 0;
  let max = 1, cur = 1;
  for (let i = 1; i < arr.length; i++) {
    if (arr[i] === arr[i-1]) { cur++; if (cur > max) max = cur; }
    else cur = 1;
  }
  return max;
}

function calcTopTrigram(arr) {
  if (arr.length < 3) return '';
  const counts = {};
  for (let i = 0; i <= arr.length - 3; i++) {
    const t = arr[i] + '' + arr[i+1] + '' + arr[i+2];
    counts[t] = (counts[t] || 0) + 1;
  }
  let best = '', bestN = 0;
  for (const k in counts) {
    if (counts[k] > bestN) { best = k; bestN = counts[k]; }
  }
  return best;
}

function sendStats(d) {

}

// ===== BALANCE GRAPH (canvas) =====
function drawBalanceGraph(canvas, history, initial) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width = canvas.offsetWidth * 2;
  const H = canvas.height = canvas.offsetHeight * 2;
  ctx.scale(2, 2);
  const w = W / 2, h = H / 2;

  const all = [initial, ...history];
  const maxB = Math.max(...all, initial * 1.3);
  const minB = Math.min(...all, initial * 0.3);
  const range = maxB - minB || 1;

  function yOf(v) { return h - ((v - minB) / range) * (h - 8) - 4; }
  function xOf(i) { return (i / (all.length - 1)) * w; }

  ctx.strokeStyle = '#333';
  ctx.lineWidth = 0.5;
  ctx.setLineDash([3, 3]);
  ctx.beginPath();
  ctx.moveTo(0, yOf(initial));
  ctx.lineTo(w, yOf(initial));
  ctx.stroke();
  ctx.setLineDash([]);

  for (let i = 1; i < all.length; i++) {
    const x0 = xOf(i - 1), y0 = yOf(all[i - 1]);
    const x1 = xOf(i), y1 = yOf(all[i]);
    const above = (all[i - 1] + all[i]) / 2 >= initial;

    const yBase = yOf(initial);
    ctx.beginPath();
    ctx.moveTo(x0, y0);
    ctx.lineTo(x1, y1);
    ctx.lineTo(x1, yBase);
    ctx.lineTo(x0, yBase);
    ctx.closePath();
    ctx.fillStyle = above ? 'rgba(0,255,136,0.15)' : 'rgba(255,34,68,0.12)';
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(x0, y0);
    ctx.lineTo(x1, y1);
    ctx.strokeStyle = above ? '#00ff88' : '#ff2244';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }
}

// ===== RESULT =====
function showResult() {
  const lvl = LEVELS[state.level];
  const scored = state.correct.length;
  const correctN = state.correctPredictions;
  const pct = scored > 0 ? (correctN / scored * 100) : 0;
  const won = state.balance >= state.initialBalance;
  const hasNext = state.level < LEVELS.length - 1;

  // Context-aware result message — each key is an array of variants; pick one at random
  const pickVariant = (v) => Array.isArray(v) ? v[Math.floor(Math.random() * v.length)] : v;
  let title = '';
  if (won) {
    if (pct < 48) title = pickVariant(T.incredible);
    else if (pct < 52) title = pickVariant(T.won);
    else title = pickVariant(T.wonBarely);
  } else {
    if (pct >= 65) title = pickVariant(T.predictable70);
    else if (pct >= 58) title = pickVariant(T.predictable60);
    else if (pct >= 53) title = pickVariant(T.almost55);
    else title = pickVariant(T.lostSoClose);
  }

  if (won && hasNext && state.level + 1 > state.maxUnlocked) state.maxUnlocked = state.level + 1;

  // Save checkpoint when player wins
  if (won) {
    state.checkpointBalance = state.balance;
  }

  // Use only current level's presses for display
  const levelPresses = state.totalPresses > 0 ? state.presses.slice(-state.totalPresses) : [];
  const count0 = levelPresses.filter(p => p === 0).length;
  const count1 = levelPresses.length - count0;

  const balColor = state.balance >= state.initialBalance ? '#00ff88' : '#ff2244';

  const isEndgame = won && !hasNext;
  const percentile = comparePercentile(lvl.id, pct);
  const cmpLine = comparisonText(percentile);

  const balKey = isEndgame ? 'endgame' : lvl.id;
  const balPercentile = compareBalancePercentile(balKey, state.balance);
  const balRankLine = balanceRankText(balPercentile, BALANCE_N[balKey]);

  // Update personal best for this category. Returns true if this run set a new record.
  const isNewBest = updateBest(balKey, state.balance);
  const bestLine = bestLineHTML(balKey, isNewBest);

  const cmpHTML = (cmpLine || balRankLine || bestLine)
    ? '<div class="result-comparison">' +
        (cmpLine ? '<div class="cmp-line">' + cmpLine + '</div>' +
                   '<div class="cmp-sub">' + T.cmpOnLevel + '</div>' : '') +
        (balRankLine ? '<div class="cmp-money">' + balRankLine + '</div>' : '') +
        (bestLine ? '<div class="cmp-best' + (isNewBest ? ' is-new' : '') + '">' + bestLine + '</div>' : '') +
      '</div>'
    : '';

  // Ask for age once, after L2 (any outcome), if not yet set.
  // Stepper (-/+ buttons) + slider for fast jump; default value AGE_DEFAULT.
  const shouldAskAge = lvl.id === 2 && getAge() === null;
  const ageCardHTML = shouldAskAge
    ? '<div class="age-card fade-item" id="ageCard" style="animation-delay:0ms">' +
        '<div class="age-title">' + T.ageTitle + '</div>' +
        '<div class="age-question">' + T.ageQuestion + '</div>' +
        '<div class="age-reason">' + T.ageReason + '</div>' +
        '<div class="age-stepper">' +
          '<button class="age-step-btn" data-delta="-1" aria-label="-1">−</button>' +
          '<div class="age-value" id="ageValue">' + AGE_DEFAULT + '</div>' +
          '<button class="age-step-btn" data-delta="1" aria-label="+1">+</button>' +
        '</div>' +
        '<input type="range" class="age-slider" id="ageSlider" min="' + AGE_MIN + '" max="' + AGE_MAX + '" value="' + AGE_DEFAULT + '">' +
        '<div class="age-actions">' +
          '<button class="age-submit" id="ageSubmit">' + T.ageSubmit + '</button>' +
          '<button class="age-skip" id="ageSkipBtn">' + T.ageSkip + '</button>' +
        '</div>' +
        '<div class="age-anon">' + T.ageAnon + '</div>' +
      '</div>'
    : '';

  const cellSize = levelPresses.length > 200 ? 4 : 6;
  const cs = ';width:' + cellSize + 'px;height:' + cellSize + 'px';

  let pressMap = '';
  levelPresses.forEach(p => {
    pressMap += '<div class="cell" style="background:' + (p===0?'#333':'#aaa') + cs + '"></div>';
  });
  let predMap = '';
  const warmup = state.totalPresses - state.correct.length;
  for (let i = 0; i < warmup; i++) predMap += '<div class="cell" style="background:#1a1a1a' + cs + '"></div>';
  state.correct.forEach(c => {
    predMap += '<div class="cell" style="background:' + (c?'#ff2244':'#00ff88') + cs + '"></div>';
  });

  const authorHTML = '<div class="result-author">' + T.author + ': <a href="https://www.facebook.com/teo.spiro.2025" target="_blank">Teo Spiro</a></div>';

  let btns = '';
  if (won && hasNext) {
    const nx = LEVELS[state.level + 1];
    const isLast = state.level + 1 === LEVELS.length - 1;
    btns = '<button class="btn-next-level ' + nx.css + (isLast ? ' final' : '') + '" id="btnNextLevel">' + T.levelName + ' ' + nx.id + ' &rarr;</button><button class="btn-secondary" id="btnRetry">' + T.replayLevel + '</button>';
  } else {
    btns = '<button class="btn-primary" id="btnRetry">' + T.retry + '</button>';
  }

  if (isEndgame) {
    // ===== ENDGAME: won all 5 levels =====
    document.getElementById('result').innerHTML =
      '<div class="endgame-card fade-item" style="animation-delay:0ms">' +
        '<div class="endgame-title">' + T.shareTitle + '</div>' +
        '<div class="endgame-badge">\u2605 ' + T.level + ' 5 \u2605</div>' +
        '<div class="endgame-message">' + T.gameComplete + '</div>' +
        '<div class="endgame-sub">' + T.provedRandom + '</div>' +
        '<div class="endgame-balance">$' + state.balance.toFixed(2) + '</div>' +
        cmpHTML +
        authorHTML +
      '</div>' +
      '<div class="balance-graph-container fade-item" style="animation-delay:150ms">' +
        '<div class="balance-graph-label">' + T.graphLabel + '</div>' +
        '<canvas class="balance-graph" id="balGraph"></canvas>' +
      '</div>' +
      '<div class="pattern-map-container fade-item" style="animation-delay:230ms">' +
        '<div class="pattern-map-label">' + T.yourPresses + '</div>' +
        '<div class="pattern-map">' + pressMap + '</div>' +
        '<div class="pattern-map-label" style="margin-top:0.4rem">' + T.predictions + '</div>' +
        '<div class="pattern-map">' + predMap + '</div>' +
      '</div>' +
      '<div class="result-buttons fade-item" style="animation-delay:310ms">' +
        '<button class="btn-primary" id="btnRetry">' + T.retry + '</button>' +
        '<button class="btn-secondary" id="btnTheory">' + T.howItWorks + '</button>' +
      '</div>';
  } else {
    // ===== NORMAL RESULT: card layout =====
    let levelUpHTML = '';
    if (won && hasNext) {
      const nx = LEVELS[state.level + 1];
      levelUpHTML = '<div class="result-level-up fade-item" style="animation-delay:350ms"><div class="level-up-title">' + T.unlocked + ' ' + T.levelName + ' ' + nx.id + '!</div><div class="level-up-desc">' + nx.presses + ' ' + T.pressesWord + ', $' + state.balance.toFixed(2) + ' ' + T.atStart + '</div></div>';
    }

    document.getElementById('result').innerHTML =
      ageCardHTML +
      '<div class="result-card fade-item" style="animation-delay:' + (shouldAskAge ? '200' : '0') + 'ms">' +
        '<div class="result-card-title">' + T.shareTitle + '</div>' +
        '<span class="result-level-badge-big ' + lvl.css + '">' + T.level + ' ' + lvl.id + '</span>' +
        '<h2 style="font-size:1.3rem;line-height:1.3">' + title + '</h2>' +
        '<div class="result-balance-big" style="color:' + balColor + '">$' + state.balance.toFixed(2) + '</div>' +
        cmpHTML +
        authorHTML +
      '</div>' +
      '<div class="balance-graph-container fade-item" style="animation-delay:150ms">' +
        '<div class="balance-graph-label">' + T.graphLabel + '</div>' +
        '<canvas class="balance-graph" id="balGraph"></canvas>' +
      '</div>' +
      '<div class="pattern-map-container fade-item" style="animation-delay:230ms">' +
        '<div class="pattern-map-label">' + T.yourPresses + '</div>' +
        '<div class="pattern-map">' + pressMap + '</div>' +
        '<div class="pattern-map-label" style="margin-top:0.4rem">' + T.predictions + '</div>' +
        '<div class="pattern-map">' + predMap + '</div>' +
      '</div>' +
      levelUpHTML +
      '<div class="result-buttons fade-item" style="animation-delay:380ms">' + btns +
        '<button class="btn-secondary" id="btnTheory">' + T.howItWorks + '</button>' +
      '</div>';
  }

  document.getElementById('btnRetry').addEventListener('click', () => startGame(state.level));
  const nextBtn = document.getElementById('btnNextLevel');
  if (nextBtn) nextBtn.addEventListener('click', () => startGame(state.level + 1));
  document.getElementById('btnTheory').addEventListener('click', showTheory);

  // Age card: stepper + slider; only present after L2 if age not yet asked
  const ageCard = document.getElementById('ageCard');
  if (ageCard) {
    const valueEl  = document.getElementById('ageValue');
    const sliderEl = document.getElementById('ageSlider');
    let currentAge = AGE_DEFAULT;
    const setAgeDisplay = (v) => {
      v = Math.max(AGE_MIN, Math.min(AGE_MAX, v|0));
      currentAge = v;
      valueEl.textContent = v;
      sliderEl.value = v;
    };
    ageCard.querySelectorAll('.age-step-btn').forEach(btn => {
      btn.addEventListener('click', () => setAgeDisplay(currentAge + (+btn.dataset.delta)));
    });
    sliderEl.addEventListener('input', (e) => setAgeDisplay(+e.target.value));
    const dismiss = () => {
      ageCard.classList.add('fade-out');
      setTimeout(() => ageCard.remove(), 250);
    };
    document.getElementById('ageSubmit').addEventListener('click', () => { setAge(currentAge); dismiss(); });
    document.getElementById('ageSkipBtn').addEventListener('click', () => { setAge('skip'); dismiss(); });
  }

  showScreen('result');

  requestAnimationFrame(() => {
    const canvas = document.getElementById('balGraph');
    if (canvas && state.balanceHistory.length > 1) drawBalanceGraph(canvas, state.balanceHistory, state.initialBalance);
  });

  // Enhanced analytics
  const accLast10 = state.correct.length >= 10 ? +(state.correct.slice(-10).filter(Boolean).length / 10 * 100).toFixed(1) : '';
  const accLast20 = state.correct.length >= 20 ? +(state.correct.slice(-20).filter(Boolean).length / 20 * 100).toFixed(1) : '';

  sendStats({
    sessionId: getSessionId(),
    attemptNumber: getAttemptNumber(),
    level: lvl.id,
    totalPresses: state.totalPresses,
    correctPredictions: correctN,
    accuracy: +pct.toFixed(1),
    balance: state.balance,
    won: won,
    reason: state.gameOverReason,
    ratio01: count0 + '/' + count1,
    maxRun: calcMaxRun(levelPresses),
    topTrigram: calcTopTrigram(levelPresses),
    sequence: levelPresses.join(''),
    predictions: state.predictions.join(''),
    predScores: state.predScores.join(','),
    pointerTypes: state.pointerTypes.join(''),
    tapsX: state.tapsX.join(','),
    tapsY: state.tapsY.join(','),
    timestamps: state.timestamps.join(','),
    accLast10: accLast10,
    accLast20: accLast20,
    carryoverBalance: state.carryoverBalance,
    device: getDeviceType(),
    lang: currentLang,
    age: getAge() || '',
    userAgent: navigator.userAgent,
  });
}

// ===== START GAME =====
function startGame(levelIndex) {
  const prevLevel = state.level;
  state.level = levelIndex || 0;
  const lvl = LEVELS[state.level];

  // Detect retry: same level as before AND we already played something.
  const isReplay = levelIndex === prevLevel && state.totalPresses > 0;

  if (isReplay) {
    // Restore algorithm to its state at level-entry — forget the lost attempt.
    // (If the player had won, they'd be advancing, not replaying.)
    state.presses = (state.pressesCheckpoint || []).slice();
    state.table = JSON.parse(JSON.stringify(state.tableCheckpoint || {}));
    state.currentMaxK = state.currentMaxKCheckpoint || lvl.maxK;
    if (Object.keys(state.table).length === 0) initTable(lvl.maxK);
    else if (lvl.maxK > state.currentMaxK) expandTable(lvl.maxK);
  } else {
    // First-ever start OR advance to next level: prepare table, then snapshot
    // current state as the checkpoint for THIS level.
    if (Object.keys(state.table).length === 0) initTable(lvl.maxK);
    else if (lvl.maxK > state.currentMaxK) expandTable(lvl.maxK);
    state.pressesCheckpoint = state.presses.slice();
    state.tableCheckpoint = JSON.parse(JSON.stringify(state.table));
    state.currentMaxKCheckpoint = state.currentMaxK;
  }

  // Balance: carry over when advancing, reset when replaying
  if (levelIndex > prevLevel && levelIndex > 0 && state.presses.length > 0) {
    state.carryoverBalance = state.balance;
    state.initialBalance = state.balance;
    state.balanceHistory = [state.balance];
  } else {
    // Replay or fresh start: use checkpoint if available
    const startBalance = state.checkpointBalance !== null ? state.checkpointBalance : lvl.balance;
    state.balance = startBalance;
    state.initialBalance = startBalance;
    state.balanceHistory = [startBalance];
    state.carryoverBalance = state.checkpointBalance !== null ? state.checkpointBalance : null;
  }

  state.predictions = [];
  state.predScores = [];
  state.correct = [];
  state.totalPresses = 0;
  state.correctPredictions = 0;
  state.gameOver = false;
  state.gameOverReason = '';
  state.lastPressTime = 0;
  state.gameStartTime = Date.now();
  state.timestamps = [];
  state.tapsX = [];
  state.tapsY = [];
  state.pointerTypes = [];
  state.firstTapDone = false;
  document.getElementById('game').classList.remove('tapped');
  const appEl = document.getElementById('app');
  appEl.classList.remove('l1', 'l2', 'l3', 'l4', 'l5');
  appEl.classList.add(lvl.css);
  updateWater();
  updateHUD();
  document.getElementById('hudPredResult').className = 'hud-prediction-result';
  document.getElementById('hudPredResult').textContent = '';
  showScreen('game');
}

// ===== EVENTS =====
document.getElementById('btnStart').addEventListener('click', () => startGame(0));

document.getElementById('game').addEventListener('pointerdown', (e) => {
  if (state.screen !== 'game' || state.gameOver) return;
  if (e.target.closest('.btn-stop')) return;
  activePointerId = e.pointerId;
  const rect = document.getElementById('game').getBoundingClientRect();
  const choice = e.clientX < window.innerWidth / 2 ? 0 : 1;
  handlePress(choice, e.clientX - rect.left, e.clientY - rect.top, e.pointerId, e.pointerType, rect.width, rect.height);
});

document.getElementById('game').addEventListener('pointerup', (e) => {
  if (e.pointerId === activePointerId) activePointerId = null;
});
document.getElementById('game').addEventListener('pointercancel', (e) => {
  if (e.pointerId === activePointerId) activePointerId = null;
});

document.getElementById('btnStop').addEventListener('click', () => {
  const lvl = LEVELS[state.level];
  if (state.totalPresses >= lvl.stopMin && !state.gameOver) {
    state.gameOver = true; state.gameOverReason = 'manual'; showResult();
  }
});

// ===== KEYBOARD (arrows) =====
document.addEventListener('keydown', (e) => {
  if (state.screen !== 'game' || state.gameOver) return;
  let choice = -1;
  if (e.key === 'ArrowLeft') choice = 0;
  else if (e.key === 'ArrowRight') choice = 1;
  if (choice < 0) return;
  e.preventDefault();
  const rect = document.getElementById('game').getBoundingClientRect();
  const cx = choice === 0 ? rect.width * 0.25 : rect.width * 0.75;
  const cy = rect.height * 0.5;
  handlePress(choice, cx, cy, 'keyboard', 'keyboard', rect.width, rect.height);
});

// ===== DEV MODE — visible only with ?dev=1 in URL, or via Shift+D toggle =====
let devBar = null;
function buildDevBar_() {
  const bar = document.createElement('div');
  bar.id = 'devBar';
  bar.style.cssText = 'position:fixed;top:calc(env(safe-area-inset-top) + 0.4rem);right:0.4rem;z-index:99999;display:flex;gap:0.25rem;padding:0.35rem;background:rgba(0,0,0,0.85);border:1px solid #666;border-radius:8px;font-family:JetBrains Mono,monospace';
  const mkBtn = (label, onClick, extra) => {
    const b = document.createElement('button');
    b.textContent = label;
    b.style.cssText = 'background:none;border:1px solid #666;color:#ddd;padding:0.3rem 0.55rem;font-family:inherit;font-size:0.7rem;font-weight:700;border-radius:4px;cursor:pointer;letter-spacing:0.05em' + (extra || '');
    b.addEventListener('click', (e) => { e.stopPropagation(); e.preventDefault(); onClick(); });
    b.addEventListener('pointerdown', (e) => { e.stopPropagation(); });
    return b;
  };
  for (let i = 0; i < LEVELS.length; i++) {
    bar.appendChild(mkBtn('L' + (i + 1), () => startGame(i)));
  }
  bar.appendChild(mkBtn('WIN', () => {
    if (state.screen !== 'game') return;
    state.balance = state.initialBalance + 15;
    state.balanceHistory.push(state.balance);
    state.gameOver = true; state.gameOverReason = 'dev';
    showResult();
  }));
  bar.appendChild(mkBtn('AGE', () => {
    localStorage.removeItem('tns_age');
    location.reload();
  }));
  bar.appendChild(mkBtn('×', () => { bar.remove(); devBar = null; }, ';color:#888;border-color:#444'));
  return bar;
}
function toggleDevBar_() {
  if (devBar) { devBar.remove(); devBar = null; }
  else { devBar = buildDevBar_(); document.body.appendChild(devBar); }
}
if (new URLSearchParams(location.search).get('dev') === '1') toggleDevBar_();
document.addEventListener('keydown', (e) => {
  if (e.shiftKey && (e.code === 'KeyD' || e.key === 'D' || e.key === 'd')) {
    e.preventDefault();
    toggleDevBar_();
  }
});
